    <animate attributeName="y" values="34;19;34" dur="0.8s" repeatCount="indefinite" />
  </rect>
  <rect x="79" y="44" width="8" height="40" rx="4" fill="white">
    <animate attributeName="height" values="40;60;40" dur="1.5s" repeatCount="indefinite" />
    <animate attributeName="y" values="44;34;44" dur="1.5s" repeatCount="indefinite" />
  </rect>
  <rect x="97" y="54" width="8" height="20" rx="4" fill="white">
    <animate attributeName="height" values="20;35;20" dur="1.1s" repeatCount="indefinite" />
