    <animate attributeName="y" values="54;44;54" dur="1s" repeatCount="indefinite" />
  </rect>
  <rect x="43" y="44" width="8" height="40" rx="4" fill="white">
    <animate attributeName="height" values="40;70;40" dur="1.2s" repeatCount="indefinite" />
    <animate attributeName="y" values="44;29;44" dur="1.2s" repeatCount="indefinite" />
  </rect>
  <rect x="61" y="34" width="8" height="60" rx="4" fill="white">
